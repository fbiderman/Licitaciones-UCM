name: Resolver Codigos Proveedor

on:
  workflow_dispatch:
    inputs:
      meses:
        description: "Cuántos meses hacia atrás recorrer para resolver códigos"
        required: false
        default: "12"

permissions:
  contents: write

jobs:
  resolver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Corregir codigo_proveedor desde Datos Abiertos
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=""
          for i in $(seq 1 ${{ inputs.meses }}); do
            YM=$(date -d "$(date +%Y-%m-01) -$i month" +%Y-%-m)
            ARGS="$ARGS --url https://transparenciachc.blob.core.windows.net/oc-da/$YM.zip"
          done
          echo "Meses a revisar: $ARGS"
          python pipeline.py resolve-da $ARGS

      - name: Guardar providers.csv
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add providers.csv
          git commit -m "Corregir CodigoProveedor desde Datos Abiertos" || echo "Sin cambios"
          git push
