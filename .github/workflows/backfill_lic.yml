name: Backfill Licitaciones (Datos Abiertos)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Un mes: URL completa o solo AÑO-MES (ej: 2026-6). Vacío = usar rango o carpeta."
        required: false
        default: ""
      desde:
        description: "Rango (opcional): mes inicial AÑO-MES, ej: 2023-1"
        required: false
        default: ""
      hasta:
        description: "Rango (opcional): mes final AÑO-MES, ej: 2026-6"
        required: false
        default: ""
      dry_run:
        description: "Prueba: solo muestra el mapeo de columnas y cuenta las de traslado, sin guardar ni publicar"
        type: boolean
        required: false
        default: true

permissions:
  contents: write        # para guardar la base actualizada cuando NO es dry-run
  pages: write
  id-token: write

concurrency:             # comparte cola con el workflow diario para no chocar al publicar
  group: pages
  cancel-in-progress: false

jobs:
  backfill-lic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Importar licitaciones de Datos Abiertos
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          if [ -n "${{ inputs.desde }}" ] && [ -n "${{ inputs.hasta }}" ]; then
            python pipeline.py import-lic-da --desde "${{ inputs.desde }}" --hasta "${{ inputs.hasta }}" $DRY
          elif [ -n "${{ inputs.url }}" ]; then
            python pipeline.py import-lic-da --url "${{ inputs.url }}" $DRY
          else
            python pipeline.py import-lic-da --dir lic_abiertos $DRY
          fi

      - name: Reconstruir el panel
        if: ${{ inputs.dry_run == false }}
        run: python pipeline.py build

      - name: Guardar la base en el repositorio
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add mp_traslados.db dashboard.html
          git commit -m "Backfill licitaciones (Datos Abiertos)" || echo "Sin cambios"
          git push

      - name: Configurar Pages
        if: ${{ inputs.dry_run == false }}
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        if: ${{ inputs.dry_run == false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar en Pages
        if: ${{ inputs.dry_run == false }}
        uses: actions/deploy-pages@v4
